<div 
  class="fixed inset-0 bg-black/90 flex items-center justify-center z-50"
  (click)="close()">

  <!-- Content -->
  <div class="relative text-center text-white" (click)="$event.stopPropagation()">

    <!-- Close Button -->
    <button 
      (click)="close()"
      class="absolute top-4 right-4 text-white text-3xl font-bold">
      ✖
    </button>

    <!-- Player Image -->
    <img 
      [src]="currentPlayer()?.photoUrl || 'https://via.placeholder.com/150'"
      class="w-60 h-60 rounded-full mx-auto mb-4 border-4 border-white"
    />

    <!-- Player Name -->
    <h2 class="text-3xl font-bold">
      {{ currentPlayer()?.name }}
    </h2>

    <!-- Navigation -->
    <div class="mt-6 flex justify-center gap-4">

      <button 
        (click)="prev(); $event.stopPropagation()" 
        class="bg-gray-600 hover:bg-gray-700 px-4 py-2 rounded">
        ⬅ Prev
      </button>

      <button 
        (click)="next(); $event.stopPropagation()" 
        class="bg-gray-600 hover:bg-gray-700 px-4 py-2 rounded">
        Next ➡
      </button>

    </div>

    <!-- 🔥 Draft button (correct place) -->
    <div class="mt-4">
      <button 
        (click)="draftPlayer(); $event.stopPropagation()"
        class="bg-green-600 hover:bg-green-700 px-6 py-2 rounded text-white font-bold">
        ➕ Draft Player
      </button>
    </div>

  </div>
</div>
